<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS - Grades</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
:root { --red:#8B0000; --dark-red:#5C0000; --green:#28a745; --border:#ddd; }
body { background:#f5f5f5; min-height:100vh; }
.header { display:flex; justify-content:space-between; align-items:center; padding:14px 30px; background:var(--red); color:white; flex-wrap:wrap; gap:10px; }
.header-left { display:flex; align-items:center; gap:12px; }
.header-left img { width:36px; height:auto; }
.header h1 { font-size:17px; font-weight:600; }
.header-actions { display:flex; gap:8px; flex-wrap:wrap; }
.btn-hdr { padding:8px 14px; border:1px solid rgba(255,255,255,0.4); background:rgba(255,255,255,0.15); color:white; border-radius:5px; cursor:pointer; font-size:0.82rem; font-weight:600; text-decoration:none; }
.btn-hdr:hover { background:rgba(255,255,255,0.3); }
.main { padding:2rem; max-width:1150px; margin:0 auto; }
.page-title { color:var(--red); font-size:1.4rem; margin-bottom:1.5rem; }
.form-container { background:white; border-radius:8px; padding:1.6rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); margin-bottom:1.6rem; border-top:4px solid var(--red); display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }
.form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:150px; }
.form-group label { font-weight:600; color:#555; font-size:0.85rem; }
.form-group input, .form-group select { padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:0.92rem; background:#fafafa; }
.btn-primary { background:var(--red); color:white; padding:11px 22px; border:none; border-radius:6px; cursor:pointer; font-weight:700; }
.btn-primary:hover { background:var(--dark-red); }
.alert { padding:11px 15px; border-radius:6px; margin-bottom:1rem; display:none; font-weight:600; border-left:4px solid; }
.alert.show { display:block; }
.alert-success { background:#d4edda; color:#155724; border-color:var(--green); }
.alert-error { background:#f8d7da; color:#721c24; border-color:#dc3545; }
.score-key { font-size:0.78rem; color:#888; margin-bottom:1rem; }
.table-container { background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.07); overflow-x:auto; margin-bottom:1.5rem; }
table { width:100%; border-collapse:collapse; min-width:900px; }
th { background:var(--red); color:white; padding:11px 10px; text-align:left; font-size:10.5px; text-transform:uppercase; }
td { padding:8px 10px; border-bottom:1px solid #f0f0f0; font-size:13px; }
input.score-input { width:55px; padding:6px 7px; border:1px solid var(--border); border-radius:5px; text-align:center; }
.total-cell { font-weight:700; color:var(--red); }
.empty-state { text-align:center; padding:40px; color:#999; font-size:13px; }
</style>
</head>
<body>
<div class="header">
<div class="header-left"><img src="logo.png" alt="AIS"><h1>AIS Admin Portal</h1></div>
<div class="header-actions">
<a href="dashboard.html" class="btn-hdr">🏠 Dashboard</a>
<a href="classes.html" class="btn-hdr">📚 Classes</a>
<a href="attendance.html" class="btn-hdr">📋 Attendance</a>
<a href="fees.html" class="btn-hdr">💰 Fees</a>
<button class="btn-hdr" onclick="logout()">🚪 Logout</button>
</div>
</div>
<div class="main">
<div id="alertBox" class="alert"></div>
<h1 class="page-title">📝 Enter Grades</h1>
<div class="form-container">
<div class="form-group"><label>Class</label><select id="classSelect" onchange="loadStudentsForClass()"><option value="">Select Class</option></select></div>
<div class="form-group"><label>Subject</label>
<select id="subject">
<option value="">Select Subject</option>
<option>English Language</option>
<option>English Literature</option>
<option>Mathematics</option>
<option>Further Mathematics</option>
<option>Biology</option>
<option>Chemistry</option>
<option>Physics</option>
<option>Combined Science</option>
<option>Geography</option>
<option>History</option>
<option>Religious Studies</option>
<option>Computer Science / ICT</option>
<option>French</option>
<option>Spanish</option>
<option>Business Studies</option>
<option>Economics</option>
<option>Government / Civic Education</option>
<option>Agricultural Science</option>
<option>Art & Design</option>
<option>Music</option>
<option>Physical Education</option>
</select></div>
<div class="form-group"><label>Term</label><input type="text" id="term" placeholder="e.g., First Term 2025/2026"></div>
</div>
<div class="score-key">Enter raw scores for each component — the Total column adds them up automatically.</div>
<div class="table-container">
<table id="studentsTable">
<thead><tr>
<th>Student</th><th>ID</th>
<th>1st Assign.</th><th>2nd Assign.</th>
<th>1st CA</th><th>2nd CA</th>
<th>Project</th><th>Exam</th>
<th>Total</th>
</tr></thead>
<tbody></tbody>
</table>
<div id="emptyState" class="empty-state">Select a class to load students.</div>
</div>
<button class="btn-primary" onclick="saveGrades()">✓ Save Grades</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }
  await loadClasses();
})();
sb.auth.onAuthStateChange((e) => { if (e === 'SIGNED_OUT') window.location.href = 'index.html'; });
async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

function showAlert(msg, type='success') {
  const box = document.getElementById('alertBox');
  box.textContent = msg; box.className = 'alert alert-' + type + ' show';
  setTimeout(() => box.className = 'alert', 4000);
}

function letterGrade(total) {
  if (total >= 70) return 'A';
  if (total >= 60) return 'B';
  if (total >= 50) return 'C';
  if (total >= 45) return 'D';
  if (total >= 40) return 'E';
  return 'F';
}

async function loadClasses() {
  const { data, error } = await sb.from('students').select('class');
  const select = document.getElementById('classSelect');
  if (error) { showAlert('Error loading classes: ' + error.message, 'error'); return; }
  const classes = [...new Set((data || []).map(s => s.class).filter(Boolean))].sort();
  select.innerHTML = '<option value="">Select Class</option>' + classes.map(c => `<option value="${c}">${c}</option>`).join('');
}

const COMPONENT_CLASSES = ['fa-input','sa-input','fca-input','sca-input','proj-input','exam-input'];

async function loadStudentsForClass() {
  const cls = document.getElementById('classSelect').value;
  const tbody = document.querySelector('#studentsTable tbody');
  const empty = document.getElementById('emptyState');
  if (!cls) { tbody.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'Select a class to load students.'; return; }

  const { data, error } = await sb.from('students').select('*').eq('class', cls);
  if (error) { showAlert('Error loading students: ' + error.message, 'error'); return; }

  if (!data || data.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'No students in this class yet.'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = data.map(s => {
    const name = ((s.first_name || '') + ' ' + (s.last_name || '')).trim();
    const inputs = COMPONENT_CLASSES.map(c => `<td><input type="number" class="score-input ${c}" min="0" placeholder="0"></td>`).join('');
    return `<tr data-id="${s.student_id}" data-name="${name}" data-class="${cls}">
<td>${name}</td><td>${s.student_id}</td>
${inputs}
<td class="total-cell total-display">0</td></tr>`;
  }).join('');

  tbody.querySelectorAll('tr').forEach(row => {
    const recalc = () => {
      const total = COMPONENT_CLASSES.reduce((sum, c) => sum + (parseFloat(row.querySelector('.' + c).value) || 0), 0);
      row.querySelector('.total-display').textContent = total;
    };
    COMPONENT_CLASSES.forEach(c => row.querySelector('.' + c).addEventListener('input', recalc));
  });
}

async function saveGrades() {
  const subject = document.getElementById('subject').value.trim();
  const term = document.getElementById('term').value.trim();
  if (!subject) { showAlert('Subject is required.', 'error'); return; }
  if (!term) { showAlert('Term is required.', 'error'); return; }

  const rows = document.querySelectorAll('#studentsTable tbody tr');
  if (rows.length === 0) { showAlert('No students to grade.', 'error'); return; }

  const records = [];
  rows.forEach(row => {
    const get = c => row.querySelector('.' + c).value;
    const allEmpty = COMPONENT_CLASSES.every(c => get(c) === '');
    if (allEmpty) return;

    const fa = parseFloat(get('fa-input')) || 0;
    const sa = parseFloat(get('sa-input')) || 0;
    const fca = parseFloat(get('fca-input')) || 0;
    const sca = parseFloat(get('sca-input')) || 0;
    const proj = parseFloat(get('proj-input')) || 0;
    const exam = parseFloat(get('exam-input')) || 0;
    const total = fa + sa + fca + sca + proj + exam;

    records.push({
      student_id: row.dataset.id,
      student_name: row.dataset.name,
      class: row.dataset.class,
      subject, term,
      first_assignment: fa, second_assignment: sa,
      first_ca: fca, second_ca: sca,
      project: proj, exam: exam,
      score: total,
      grade_letter: letterGrade(total),
      recorded_by: 'admin'
    });
  });

  if (records.length === 0) { showAlert('Enter at least one score.', 'error'); return; }

  const ids = records.map(r => r.student_id);
  await sb.from('grades').delete().in('student_id', ids).eq('subject', subject).eq('term', term);
  const { error } = await sb.from('grades').insert(records);
  if (error) { showAlert('Error saving grades: ' + error.message, 'error'); return; }
  showAlert(`Saved ${records.length} grade(s) for ${subject} - ${term}.`);
}
</script>
</body>
</html>

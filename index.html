<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS - Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
:root { --red:#8B0000; --dark-red:#5C0000; }
body {
  background:linear-gradient(135deg, var(--red), var(--dark-red));
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-card {
  background:white; border-radius:14px; padding:2.5rem 2.2rem; width:100%; max-width:380px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3); text-align:center;
}
.logo { width:90px; height:auto; margin-bottom:1rem; }
.school-name { color:var(--red); font-size:1.3rem; font-weight:700; margin-bottom:0.2rem; }
.subtitle { color:#888; font-size:0.85rem; margin-bottom:1.8rem; }
.form-group { text-align:left; margin-bottom:1.1rem; }
.form-group label { display:block; font-size:0.85rem; font-weight:600; color:#555; margin-bottom:5px; }
.form-group input {
  width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:7px;
  font-size:0.95rem; background:#fafafa; transition:all 0.2s;
}
.form-group input:focus { outline:none; border-color:var(--red); background:white; box-shadow:0 0 0 3px rgba(139,0,0,0.08); }
.btn-login {
  width:100%; padding:13px; background:var(--red); color:white; border:none;
  border-radius:7px; font-size:1rem; font-weight:700; cursor:pointer; margin-top:0.5rem;
  transition:background 0.2s;
}
.btn-login:hover { background:var(--dark-red); }
.btn-login:disabled { background:#bbb; cursor:not-allowed; }
.alert {
  display:none; background:#f8d7da; color:#721c24; padding:11px 14px;
  border-radius:7px; margin-bottom:1.1rem; font-size:0.85rem; font-weight:600; border-left:4px solid #dc3545;
}
.alert.show { display:block; }
</style>
</head>
<body>
<div class="login-card">
<img src="logo.png" alt="AIS Logo" class="logo">
<div class="school-name">AIS Admin Portal</div>
<div class="subtitle">Sign in to manage your school</div>
<div id="alertBox" class="alert"></div>
<form id="loginForm">
<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="admin@school.com" required autocomplete="username">
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
</div>
<button type="submit" class="btn-login" id="loginBtn">Sign In</button>
</form>
<div style="margin-top:1.2rem; font-size:0.82rem;">
<a href="student_login.html" style="color:var(--red); text-decoration:none;">Student Portal</a>
&nbsp;·&nbsp;
<a href="teacher_login.html" style="color:var(--red); text-decoration:none;">Teacher Portal</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
function showAlert(msg) {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert show';
}

// If already logged in, skip straight to dashboard.
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) window.location.href = 'dashboard.html';
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showAlert(error.message || 'Could not sign in. Check your email and password.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS - Edit Student</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
:root { --red:#8B0000; --dark-red:#5C0000; --green:#28a745; --border:#ddd; }
body { background:#f5f5f5; min-height:100vh; }
.header { display:flex; justify-content:space-between; align-items:center; padding:14px 30px; background:var(--red); color:white; flex-wrap:wrap; gap:10px; }
.header-left { display:flex; align-items:center; gap:12px; }
.header-left img { width:36px; height:auto; }
.header h1 { font-size:17px; font-weight:600; }
.btn-hdr { padding:8px 16px; border:1px solid rgba(255,255,255,0.4); background:rgba(255,255,255,0.15); color:white; border-radius:5px; cursor:pointer; font-size:0.85rem; font-weight:600; text-decoration:none; }
.btn-hdr:hover { background:rgba(255,255,255,0.3); }
.main { padding:2rem; max-width:800px; margin:0 auto; }
.page-title { color:var(--red); font-size:1.4rem; margin-bottom:1.5rem; }
.form-container { background:white; border-radius:8px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); border-top:4px solid var(--red); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-weight:600; color:#555; font-size:0.85rem; }
.form-group input, .form-group select, .form-group textarea { padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:0.92rem; background:#fafafa; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--red); background:white; }
.form-actions { display:flex; gap:1rem; margin-top:1.5rem; padding-top:1.2rem; border-top:2px solid #f0f0f0; }
.btn-primary { background:var(--red); color:white; padding:11px 26px; border:none; border-radius:6px; cursor:pointer; font-weight:700; }
.btn-primary:hover { background:var(--dark-red); }
.btn-secondary { background:#6c757d; color:white; padding:11px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:600; text-decoration:none; display:inline-block; }
.alert { padding:11px 15px; border-radius:6px; margin-bottom:1rem; display:none; font-weight:600; border-left:4px solid; }
.alert.show { display:block; }
.alert-success { background:#d4edda; color:#155724; border-color:var(--green); }
.alert-error { background:#f8d7da; color:#721c24; border-color:#dc3545; }
.locked-msg { text-align:center; padding:40px; color:#999; }
</style>
</head>
<body>
<div class="header">
<div class="header-left"><img src="logo.png" alt="AIS"><h1>AIS Portal</h1></div>
<a href="#" id="backLink" class="btn-hdr">← Back</a>
</div>

<div class="main">
<div id="alertBox" class="alert"></div>
<h1 class="page-title">✏️ Edit Student</h1>
<div id="formArea"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const studentId = params.get('id');
let isAdmin = false;
let backUrl = 'dashboard.html';

function showAlert(msg, type='success') {
  const box = document.getElementById('alertBox');
  box.textContent = msg; box.className = 'alert alert-' + type + ' show';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function locked(msg) {
  document.getElementById('formArea').innerHTML = `<div class="form-container locked-msg">🔒 ${msg}</div>`;
}

async function init() {
  if (!studentId) { locked('No student specified.'); return; }

  const { data: session } = await sb.auth.getSession();
  const teacherId = sessionStorage.getItem('teacher_session');

  if (session.session) {
    isAdmin = true;
  } else if (teacherId) {
    backUrl = 'teacher_dashboard.html';
    document.getElementById('backLink').href = backUrl;
  } else {
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('backLink').href = backUrl;

  const { data: student, error } = await sb.from('students').select('*').eq('student_id', studentId).maybeSingle();
  if (error || !student) { locked('Student not found.'); return; }

  if (!isAdmin) {
    const { data: teacher } = await sb.from('teachers').select('*').eq('teacher_id', teacherId).maybeSingle();
    if (!teacher || !teacher.assigned_class || teacher.assigned_class !== student.class) {
      locked("You don't have permission to edit this student. You can only edit students in your assigned class.");
      return;
    }
  }

  renderForm(student);
}

function renderForm(s) {
  document.getElementById('formArea').innerHTML = `
<div class="form-container">
<div class="form-grid">
<div class="form-group"><label>First Name</label><input id="firstName" value="${s.first_name || ''}"></div>
<div class="form-group"><label>Last Name</label><input id="lastName" value="${s.last_name || ''}"></div>
<div class="form-group"><label>Gender</label><select id="gender">
<option ${s.gender==='Male'?'selected':''}>Male</option><option ${s.gender==='Female'?'selected':''}>Female</option></select></div>
<div class="form-group"><label>Class</label><select id="studentClass">
${['Year 7','Year 8','Year 9','Year 10','Year 11','Year 12'].map(c => `<option ${s.class===c?'selected':''}>${c}</option>`).join('')}
</select></div>
<div class="form-group"><label>Date of Birth</label><input type="date" id="dob" value="${s.dob || ''}"></div>
<div class="form-group"><label>Admission Date</label><input type="date" id="admissionDate" value="${s.admission_date || ''}"></div>
<div class="form-group"><label>Parent / Guardian Name</label><input id="parentName" value="${s.parent_name || ''}"></div>
<div class="form-group"><label>Parent / Guardian Phone</label><input id="parentPhone" value="${s.parent_phone || ''}"></div>
<div class="form-group"><label>Parent Email</label><input id="parentEmail" value="${s.parent_email || ''}"></div>
<div class="form-group"><label>State of Origin</label><input id="stateOfOrigin" value="${s.state_of_origin || ''}"></div>
<div class="form-group full"><label>Home Address</label><textarea id="address">${s.address || ''}</textarea></div>
</div>
<div class="form-actions">
<button class="btn-primary" onclick="saveStudent()">✓ Save Changes</button>
<a href="${backUrl}" class="btn-secondary">Cancel</a>
</div>
</div>`;
}

async function saveStudent() {
  const updated = {
    first_name: document.getElementById('firstName').value.trim(),
    last_name: document.getElementById('lastName').value.trim(),
    gender: document.getElementById('gender').value,
    class: document.getElementById('studentClass').value,
    dob: document.getElementById('dob').value || null,
    admission_date: document.getElementById('admissionDate').value || null,
    parent_name: document.getElementById('parentName').value.trim(),
    parent_phone: document.getElementById('parentPhone').value.trim(),
    parent_email: document.getElementById('parentEmail').value.trim(),
    state_of_origin: document.getElementById('stateOfOrigin').value.trim(),
    address: document.getElementById('address').value.trim()
  };

  // Non-admin teachers can't move a student out of the class they're allowed to edit.
  if (!isAdmin) {
    const teacherId = sessionStorage.getItem('teacher_session');
    const { data: teacher } = await sb.from('teachers').select('assigned_class').eq('teacher_id', teacherId).maybeSingle();
    if (updated.class !== teacher.assigned_class) {
      showAlert("You can't move a student out of your assigned class.", 'error');
      return;
    }
  }

  const { error } = await sb.from('students').update(updated).eq('student_id', studentId);
  if (error) { showAlert('Error saving: ' + error.message, 'error'); return; }
  showAlert('Student updated successfully.');
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS - Register Student</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
:root { --red:#8B0000; --dark-red:#5C0000; --green:#28a745; --border:#ddd; }
body { background:#f5f5f5; min-height:100vh; }
.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 30px; background:var(--red); color:white; border-bottom:3px solid #fff; flex-wrap:wrap; gap:10px;
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-left img { width:36px; height:auto; }
.header h1 { font-size:17px; font-weight:600; }
.header-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.btn-hdr {
  padding:8px 16px; border:1px solid rgba(255,255,255,0.4); background:rgba(255,255,255,0.15);
  color:white; border-radius:5px; cursor:pointer; font-size:0.85rem; font-weight:600;
  text-decoration:none; display:inline-flex; align-items:center; gap:5px;
}
.btn-hdr:hover { background:rgba(255,255,255,0.3); }
.main { padding:2rem; max-width:1000px; margin:0 auto; }
.page-title { color:var(--red); font-size:1.4rem; margin-bottom:1.5rem; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.8rem; }
.stat-card { background:white; border-radius:8px; padding:1.3rem; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.07); border-top:4px solid var(--red); }
.stat-number { font-size:2rem; font-weight:bold; color:var(--red); }
.stat-label { color:#666; font-size:0.78rem; text-transform:uppercase; }
.form-container { background:white; border-radius:8px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,0.07); margin-bottom:1.8rem; border-top:4px solid var(--red); }
.section-title { color:var(--red); font-size:1rem; font-weight:700; margin-bottom:1.2rem; padding-bottom:0.6rem; border-bottom:2px solid #f0f0f0; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-weight:600; color:#555; font-size:0.85rem; }
.req { color:var(--red); }
.form-group input, .form-group select, .form-group textarea {
  padding:10px 12px; border:1px solid var(--border); border-radius:6px; font-size:0.92rem; background:#fafafa;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--red); background:white; }
.form-group small { color:#888; font-size:0.75rem; }
.file-upload { border:2px dashed var(--border); border-radius:8px; padding:1.5rem; text-align:center; cursor:pointer; background:#fafafa; }
.file-upload:hover { border-color:var(--red); }
.file-upload input { display:none; }
.file-name { color:var(--red); font-weight:600; font-size:0.85rem; margin-top:6px; }
.form-actions { display:flex; gap:1rem; margin-top:1.5rem; padding-top:1.2rem; border-top:2px solid #f0f0f0; }
.btn-primary { background:var(--red); color:white; padding:11px 26px; border:none; border-radius:6px; cursor:pointer; font-weight:700; }
.btn-primary:hover { background:var(--dark-red); }
.btn-secondary { background:#6c757d; color:white; padding:11px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
.btn-secondary:hover { background:#5a6268; }
.alert { padding:11px 15px; border-radius:6px; margin-bottom:1rem; display:none; font-weight:600; border-left:4px solid; }
.alert.show { display:block; }
.alert-success { background:#d4edda; color:#155724; border-color:var(--green); }
.alert-error { background:#f8d7da; color:#721c24; border-color:#dc3545; }
h3.table-heading { color:var(--red); font-size:1.1rem; margin:1.3rem 0 0.9rem; }
.table-container { background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.07); margin-bottom:30px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { background:var(--red); color:white; padding:12px 14px; text-align:left; font-size:11px; text-transform:uppercase; }
td { padding:12px 14px; border-bottom:1px solid #f0f0f0; font-size:13px; }
tr:hover td { background:#fff5f5; }
td img { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid var(--red); }
.avatar-ph { width:38px; height:38px; border-radius:50%; background:#f0f0f0; border:2px solid var(--red); display:inline-flex; align-items:center; justify-content:center; }
.btn-sm { padding:5px 10px; border:none; border-radius:4px; cursor:pointer; font-size:11px; font-weight:700; margin-right:3px; }
.btn-edit { background:var(--green); color:white; }
.btn-del { background:#dc3545; color:white; }
.empty-state { text-align:center; padding:40px; color:#999; font-size:13px; }
@media(max-width:768px) { .form-grid { grid-template-columns:1fr; } .form-group.full { grid-column:1; } .stats-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="header">
<div class="header-left"><img src="logo.png" alt="AIS"><h1>AIS Admin Portal</h1></div>
<div class="header-actions">
<a href="dashboard.html" class="btn-hdr">🏠 Dashboard</a>
<a href="register_teacher.html" class="btn-hdr">👨‍🏫 Teachers</a>
<button class="btn-hdr" onclick="logout()">🚪 Logout</button>
</div>
</div>

<div class="main">
<div id="alertBox" class="alert"></div>
<h1 class="page-title">👨‍🎓 Register New Student</h1>

<div class="stats-grid">
<div class="stat-card"><div class="stat-number" id="totalStudents">0</div><div class="stat-label">Total Students</div></div>
<div class="stat-card"><div class="stat-number" id="maleCount">0</div><div class="stat-label">Male</div></div>
<div class="stat-card"><div class="stat-number" id="femaleCount">0</div><div class="stat-label">Female</div></div>
</div>

<div class="form-container">
<div class="section-title">📝 Student Information</div>
<div class="form-grid">
<div class="form-group"><label>First Name <span class="req">*</span></label><input type="text" id="firstName" placeholder="e.g., Emeka"></div>
<div class="form-group"><label>Last Name <span class="req">*</span></label><input type="text" id="lastName" placeholder="e.g., Okafor"></div>
<div class="form-group"><label>Student ID</label><input type="text" id="studentID" placeholder="e.g., STU001"><small>Leave blank to auto-generate</small></div>
<div class="form-group"><label>Gender <span class="req">*</span></label>
<select id="gender"><option value="">Select Gender</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
<div class="form-group"><label>Class <span class="req">*</span></label>
<select id="studentClass"><option value="">Select Class</option><option>Year 7</option><option>Year 8</option><option>Year 9</option><option>Year 10</option><option>Year 11</option><option>Year 12</option></select></div>
<div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
<div class="form-group"><label>Parent / Guardian Name <span class="req">*</span></label><input type="text" id="parentName" placeholder="e.g., Mr. Okafor John"></div>
<div class="form-group"><label>Parent / Guardian Phone <span class="req">*</span></label><input type="tel" id="parentPhone" placeholder="+234 800 000 0000"></div>
<div class="form-group"><label>Parent Email</label><input type="email" id="parentEmail" placeholder="parent@email.com"></div>
<div class="form-group"><label>Admission Date <span class="req">*</span></label><input type="date" id="admissionDate"></div>
<div class="form-group"><label>State of Origin</label><input type="text" id="stateOfOrigin" placeholder="e.g., Lagos"></div>
<div class="form-group"><label>Religion</label>
<select id="religion"><option value="">Select</option><option>Christianity</option><option>Islam</option><option>Traditional</option><option>Other</option></select></div>
<div class="form-group full"><label>Home Address</label><textarea id="address" placeholder="Student's home address"></textarea></div>
<div class="form-group full"><label>Profile Picture</label>
<div class="file-upload" onclick="document.getElementById('profilePic').click()">
<input type="file" id="profilePic" accept="image/*" onchange="handleFileSelect(this)">
<div>📷 Click to upload student photo (optional)</div>
<div class="file-name" id="fileName"></div>
</div></div>
</div>
<div class="form-actions">
<button class="btn-primary" onclick="registerStudent()">✓ Register Student</button>
<button class="btn-secondary" onclick="resetForm()">↺ Reset Form</button>
</div>
</div>

<h3 class="table-heading">🎓 Registered Students</h3>
<div class="table-container">
<table id="studentsTable">
<thead><tr><th>Photo</th><th>ID</th><th>Name</th><th>Class</th><th>Gender</th><th>Parent Contact</th><th>Actions</th></tr></thead>
<tbody></tbody>
</table>
<div id="emptyState" class="empty-state" style="display:none;">No students registered yet.</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
// ==================== AUTH GUARD ====================
let currentUser = null;
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }
  currentUser = data.session.user;
  loadAndRender();
})();
sb.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT') window.location.href = 'index.html'; });
async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

let selectedFile = null;
let studentsCache = [];

function showAlert(message, type = 'success') {
  const box = document.getElementById('alertBox');
  box.textContent = message;
  box.className = 'alert alert-' + type + ' show';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => { box.className = 'alert'; }, 4500);
}
function handleFileSelect(input) {
  selectedFile = input.files[0] || null;
  document.getElementById('fileName').textContent = selectedFile ? '✅ ' + selectedFile.name : '';
}
async function fetchStudents() {
  const { data, error } = await sb.from('students').select('*').order('registered_date', { ascending: false });
  if (error) { showAlert('Error loading students: ' + error.message, 'error'); return []; }
  return data || [];
}
function updateStats() {
  document.getElementById('totalStudents').textContent = studentsCache.length;
  document.getElementById('maleCount').textContent = studentsCache.filter(s => s.gender === 'Male').length;
  document.getElementById('femaleCount').textContent = studentsCache.filter(s => s.gender === 'Female').length;
}
async function registerStudent() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const gender = document.getElementById('gender').value;
  const studentClass = document.getElementById('studentClass').value;
  const parentName = document.getElementById('parentName').value.trim();
  const parentPhone = document.getElementById('parentPhone').value.trim();
  const admissionDate = document.getElementById('admissionDate').value;

  if (!firstName || !lastName) { showAlert('First and Last name are required.', 'error'); return; }
  if (!gender) { showAlert('Please select gender.', 'error'); return; }
  if (!studentClass) { showAlert('Please select a class.', 'error'); return; }
  if (!parentName) { showAlert('Parent/Guardian name is required.', 'error'); return; }
  if (!parentPhone) { showAlert('Parent/Guardian phone is required.', 'error'); return; }
  if (!admissionDate) { showAlert('Admission date is required.', 'error'); return; }

  let id = document.getElementById('studentID').value.trim();
  if (!id) {
    id = 'STU' + String(studentsCache.length + 1).padStart(3, '0');
    while (studentsCache.find(s => s.student_id === id)) id = 'STU' + String(parseInt(id.slice(3)) + 1).padStart(3, '0');
  } else if (studentsCache.find(s => (s.student_id || '').toLowerCase() === id.toLowerCase())) {
    showAlert('Student ID "' + id + '" already exists.', 'error'); return;
  }

  const doSave = async (pic) => {
    const student = {
      student_id: id, first_name: firstName, last_name: lastName, gender, class: studentClass,
      dob: document.getElementById('dob').value || null, parent_name: parentName, parent_phone: parentPhone,
      parent_email: document.getElementById('parentEmail').value.trim(), admission_date: admissionDate,
      state_of_origin: document.getElementById('stateOfOrigin').value.trim(), religion: document.getElementById('religion').value,
      address: document.getElementById('address').value.trim(), profile_picture: pic || null, status: 'Active',
      registered_by: 'admin', registered_by_name: currentUser?.email || 'Admin'
    };
    const { error } = await sb.from('students').insert([student]);
    if (error) { showAlert('Error saving student: ' + error.message, 'error'); return; }
    resetForm(); await loadAndRender();
    showAlert(`Student "${firstName} ${lastName}" registered successfully! ID: ${id}`);
  };

  if (selectedFile) { const reader = new FileReader(); reader.onload = e => doSave(e.target.result); reader.readAsDataURL(selectedFile); }
  else await doSave(null);
}
function resetForm() {
  ['firstName','lastName','studentID','parentName','parentPhone','parentEmail','dob','stateOfOrigin','address'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('gender').value = '';
  document.getElementById('studentClass').value = '';
  document.getElementById('religion').value = '';
  document.getElementById('admissionDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('profilePic').value = '';
  document.getElementById('fileName').textContent = '';
  selectedFile = null;
}
function renderTable() {
  const tbody = document.querySelector('#studentsTable tbody');
  const empty = document.getElementById('emptyState');
  if (studentsCache.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = studentsCache.map(s => {
    const id = s.student_id || '-';
    const name = ((s.first_name || '') + ' ' + (s.last_name || '')).trim();
    const pic = s.profile_picture ? `<img src="${s.profile_picture}" alt="${name}">` : `<div class="avatar-ph">👤</div>`;
    return `<tr><td>${pic}</td><td>${id}</td><td><strong>${name}</strong></td><td>${s.class || '-'}</td><td>${s.gender || '-'}</td>
<td>${s.parent_name || '-'} · ${s.parent_phone || '-'}</td>
<td><button class="btn-sm btn-edit" onclick="editStudent('${id}')">Edit</button><button class="btn-sm btn-del" onclick="deleteStudent('${id}')">Delete</button></td></tr>`;
  }).join('');
}
function editStudent(id) {
  window.location.href = 'edit_student.html?id=' + encodeURIComponent(id);
}
async function deleteStudent(id) {
  if (!confirm('Delete this student? This cannot be undone.')) return;
  const { error } = await sb.from('students').delete().eq('student_id', id);
  if (error) { showAlert('Error deleting student: ' + error.message, 'error'); return; }
  await loadAndRender(); showAlert('Student deleted.');
}
async function loadAndRender() { studentsCache = await fetchStudents(); updateStats(); renderTable(); }
</script>
</body>
</html>
